name: Debug Build

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      hx-version: ${{ steps.haxe.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Haxe
        id: haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.3

      - name: Install Haxelib Dependencies
        run: |
          haxelib setup ~/.haxelib
          haxelib install hmm --quiet
          haxelib run hmm install

  windows:
    needs: setup
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.3

      - name: Install Dependencies
        run: |
          haxelib setup ~/.haxelib
          haxelib install hmm --quiet
          haxelib run hmm install

      - name: Build Windows (Debug)
        run: haxelib run lime build windows -debug

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Debug
          path: export/debug/windows/bin

  linux:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.3

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y libasound2-dev libx11-dev libxext-dev libxi-dev libxrandr-dev libgl1-mesa-dev
          haxelib setup ~/.haxelib
          haxelib install hmm --quiet
          haxelib run hmm install

      - name: Build Linux (Debug)
        run: haxelib run lime build linux -debug

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Debug
          path: export/debug/linux/bin

  macos:
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.3

      - name: Install Dependencies
        run: |
          brew install haxe
          haxelib setup ~/.haxelib
          haxelib install hmm --quiet
          haxelib run hmm install

      - name: Build macOS Universal (Debug)
        run: haxelib run lime build mac -debug -Dmacos-universal

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Universal-Debug
          path: export/debug/macos/bin

  android:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk
          echo "y" | sdkmanager --install "platforms;android-33" "build-tools;33.0.2"

      - name: Build Android ARM64 (Debug)
        run: haxelib run lime build android -debug -Dandroid-arm64

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-ARM64-Debug
          path: export/debug/android/bin/app/build/outputs

  ios:
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install haxe
          haxelib setup ~/.haxelib
          haxelib install hmm --quiet
          haxelib run hmm install

      - name: Build iOS Device (Debug)
        run: haxelib run lime build ios -debug -Dios-device

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Device-Debug
          path: export/debug/ios/build
